<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="100" fill="url(#gradient)"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Farm Field (stylized) -->
  <path d="M40 140 Q60 120 80 140 T120 140 T160 140" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>
  <path d="M40 150 Q60 130 80 150 T120 150 T160 150" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>
  
  <!-- Sprout/Plant Icon -->
  <g transform="translate(100, 90)">
    <!-- Stem -->
    <path d="M0 0 C-5 -15, -15 -25, -25 -30" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M0 0 C5 -15, 15 -25, 25 -30" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Left Leaf -->
    <ellipse cx="-20" cy="-35" rx="12" ry="8" fill="white" transform="rotate(-30 -20 -35)"/>
    
    <!-- Right Leaf -->
    <ellipse cx="20" cy="-35" rx="12" ry="8" fill="white" transform="rotate(30 20 -35)"/>
    
    <!-- Center Bud -->
    <circle cx="0" cy="-45" r="6" fill="white"/>
  </g>
  
  <!-- Bridge Connection (symbolizing "setu") -->
  <path d="M60 110 Q100 90 140 110" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.5"/>
  <circle cx="60" cy="110" r="4" fill="white" opacity="0.5"/>
  <circle cx="140" cy="110" r="4" fill="white" opacity="0.5"/>
</svg>
